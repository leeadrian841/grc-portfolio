version: 2
updates:
  # npm dependencies (Astro, fontsource, sitemap, …)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      # Bundle non-major updates into a single PR to cut review noise.
      all-dependencies:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in the deploy workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Singapore
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
